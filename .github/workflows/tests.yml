name: sim6502 unit tests

# Assembles every part-under-test with KickAssembler, then runs the
# tests/sim6502/*.6502 suites in Barry Walker's sim6502 Docker image.
# See docs/testing.md for the backend split (sim = pure routines).

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  sim6502:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java (KickAssembler runtime)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # kickass/KickAss.jar (KA v5.25) is committed — see .gitignore. Public
      # KA Docker images ship old KA (<=v5.14) whose symbol-file writer drops
      # labels that precede a `.for`, breaking the suite; theweb.dk's WAF 415s
      # cloud IPs. So we ship the jar and just sanity-check it's here.
      - name: Check KickAssembler
        run: test -f kickass/KickAss.jar

      # Pre-pull so a registry hiccup is its own clearly-labelled step.
      - name: Pull sim6502 image
        run: docker pull ghcr.io/barryw/sim6502:latest

      - name: Run sim6502 suite
        run: ./tests/sim6502/run.sh
